<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MKPC Track Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 1rem;
            background-color: #030316;
            color: whitesmoke;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(6, 100px);
            grid-template-rows: repeat(6, 100px);
            margin-bottom: 1rem;
            gap: 0;
            width: 600px;
        }

        .cell {
            width: 100px;
            height: 100px;
            background: #030316;
            cursor: pointer;
            box-sizing: border-box;
            border: none;
            overflow: hidden;
        }

        .cell img {
            width: 100%;
            height: 100%;
            display: block;
            margin: 0;
            padding: 0;
        }

        .palette {
            margin-bottom: 1rem;
        }

        .palette button {
            margin-right: 8px;
            padding: 0.3rem 0.6rem;
            font-size: 16px;
            cursor: pointer;
            position: relative;
            display: inline-block;
            vertical-align: top;
            text-align: center;
            width: 100px;
            user-select: none;
            background-color: rgba(76, 70, 94, 0.5);
            transition: background-color 0.3s ease;
            color: whitesmoke;
        }

        .palette button.selected {
            border: 4px solid rgb(136, 187, 255);
        }

        .palette button .name {
            display: block;
            font-size: 12px;
            margin-top: 4px;
            pointer-events: none;
            user-select: none;
        }

        .palette button img {
            width: 80px;
            height: 80px;
            display: block;
            margin: 0 auto 4px auto;
            pointer-events: none;
        }

        label {
            margin-right: 10px;
        }

        select,
        input[type=number] {
            font-size: 16px;
            padding: 0.2rem 0.5rem;
            margin-right: 10px;
        }

        #urlOutput {
            margin-top: 1rem;
            word-break: break-word;
        }

        .mkpcButton {
            cursor: pointer;
            margin-left: 5px;
            font-weight: bold;
            font-size: 20px;
            background-color: #249 !important;
            border-color: #57c !important;
            color: #abf !important;
            padding: 0 !important;
        }

        .tools {
            margin-bottom: 1rem;
        }

        .tools button {
            width: 120px;
        }

        .mkpcButton:disabled {
            cursor: not-allowed;
            background-color: #555 !important;
            border-color: #888 !important;
            color: #ccc !important;
        }
    </style>
</head>

<body>
    <div>
        <label for="trackStyle">Type:</label>
        <select id="trackStyle">
            <optgroup label="SNES - Circuit">
                <option value="1" selected="selected" class="circuit">Mario Circuit</option>
                <option value="2" class="circuit">Donut Plains</option>
                <option value="3" class="circuit">Koopa Beach</option>
                <option value="4" class="circuit">Choco Island</option>
                <option value="5" class="circuit">Vanilla Lake</option>
                <option value="56" class="circuit">Vanilla Lake 2</option>
                <option value="6" class="circuit">Ghost Valley</option>
                <option value="7" class="circuit">Bowser's Castle</option>
                <option value="8" class="circuit">Rainbow Road</option>
            </optgroup>
            <optgroup label="GBA - Circuit">
                <option value="14" class="circuit">Mario Circuit</option>
                <option value="52" class="circuit">Shy Guy Beach</option>
                <option value="55" class="circuit">Riverside Park</option>
                <option value="24" class="circuit">Bowser Castle</option>
                <option value="21" class="circuit">Boo Lake</option>
                <option value="17" class="circuit">Cheese Land</option>
                <option value="54" class="circuit">Luigi Circuit</option>
                <option value="18" class="circuit">Sky Garden</option>
                <option value="16" class="circuit">Cheep-Cheep Island</option>
                <option value="20" class="circuit">Sunset Wilds</option>
                <option value="19" class="circuit">Snow Land</option>
                <option value="22" class="circuit">Ribbon Road</option>
                <option value="23" class="circuit">Yoshi Desert</option>
                <option value="15" class="circuit">Lakeside Park</option>
                <option value="53" class="circuit">Bowser Castle 3</option>
                <option value="25" class="circuit">Rainbow Road</option>
            </optgroup>
            <optgroup label="DS - Circuit">
                <option value="31" class="circuit">Figure 8 Circuit</option>
                <option value="32" class="circuit">Yoshi Falls</option>
                <option value="33" class="circuit">Cheep-Cheep Beach</option>
                <option value="34" class="circuit">Luigi's Mansion</option>
                <option value="35" class="circuit">Desert Hills</option>
                <option value="36" class="circuit">Delfino Square</option>
                <option value="37" class="circuit">Waluigi Pinball</option>
                <option value="38" class="circuit">Shroom Ridge</option>
                <option value="39" class="circuit">DK Pass</option>
                <option value="40" class="circuit">Tick-Tock Clock</option>
                <option value="41" class="circuit">Mario Circuit</option>
                <option value="42" class="circuit">Airship Fortress</option>
                <option value="43" class="circuit">Wario Stadium</option>
                <option value="44" class="circuit">Peach Gardens</option>
                <option value="45" class="circuit">Bowser's Castle</option>
                <option value="46" class="circuit">Rainbow Road</option>
            </optgroup>
            <optgroup label="SNES - Battle">
                <option value="9" class="battle">Battle course 1</option>
                <option value="10" class="battle">Battle course 2</option>
                <option value="11" class="battle">Battle course 3</option>
                <option value="12" class="battle">Battle course 4</option>
            </optgroup>
            <optgroup label="GBA - Battle">
                <option value="26" class="battle">Battle course 1</option>
                <option value="27" class="battle">Battle course 2 - Thin</option>
                <option value="28" class="battle">Battle course 2 - Large</option>
                <option value="29" class="battle">Battle course 3</option>
                <option value="30" class="battle">Battle course 4</option>
            </optgroup>
            <optgroup label="DS - Battle">
                <option value="47" class="battle">Nintendo DS</option>
                <option value="48" class="battle">Twilight House</option>
                <option value="49" class="battle">Palm Shore - Connected</option>
                <option value="50" class="battle">Palm Shore - Separate</option>
                <option value="51" class="battle">Tart Top</option>
            </optgroup>
        </select>
        <label for="lapCount">Laps:</label>
        <input type="number" id="lapCount" min="1" max="9" value="3" style="width: 60px" />
        <label>
            <input type="checkbox" id="mixModeCheckbox">
            Illegal Track
        </label>
        <label id="gridSizeContainer" style="display: none; margin-left: 10px;">
            Grid Size: <input type="number" id="gridSizeInput" min="3" max="12" value="6" style="width: 40px;">
        </label>
    </div>

    <div class="palette" style="margin-top:1rem;">
    </div>
    <div class="tools">
        <button id="rotateButton" title="Rotate selected piece" class="mkpcButton">Rotate C</button>
        <button id="rotateLeftButton" title="Rotate selected piece" class="mkpcButton">Rotate CC</button>
        <button id="flipButton" title="Flip selected piece" class="mkpcButton">Flip</button>
    </div>
    <div id="grid"></div>

    <button id="saveImageBtn" class="mkpcButton">Save Track Image</button>
    <button id="generateUrl" class="mkpcButton">Generate URL</button>

    <p id="urlOutput"></p>

    <script>
        let isMouseDown = false;
        let gridSize = 36;
        const grid = document.getElementById('grid');
        const paletteDiv = document.querySelector('.palette');
        const rotateDiv = document.getElementById('rotateButton');
        const urlOutput = document.getElementById('urlOutput');
        const trackStyleSelect = document.getElementById('trackStyle');
        const lapCountInput = document.getElementById('lapCount');
        const rotateButton = document.getElementById('rotateButton');
        const rotateLeftButton = document.getElementById('rotateLeftButton');
        const flipButton = document.getElementById('flipButton');

        const currentRotationMap = {};
        const rotationMap = {
            '0': '1',
            '1': '2',
            '2': '3',
            '3': '0',

            '4': '5',
            '5': '6',
            '6': '7',
            '7': '4',

            '8': '9',
            '9': '8',

            '10': '10',
            '11': '11',
            '12': '12',
        };
        const reverseRotationMap = {
            '0': '3',
            '3': '2',
            '2': '1',
            '1': '0',

            '4': '7',
            '7': '6',
            '6': '5',
            '5': '4',

            '8': '9',
            '9': '8',

            '10': '10',
            '11': '11',
            '12': '12',
        };

        const flipMap = {
            '0': '2',
            '2': '0',

            '1': '3',
            '3': '1',

            '4': '5',
            '5': '4',
            '6': '7',
            '7': '6',

            '8': '8',
            '9': '9',

            '10': '10',
            '11': '11',
            '12': '12',
        };

        const basePieces = [
            { id: '0' },
            { id: '4' },
            { id: '8' },
            { id: '10' },
            { id: '11' },
            { id: '12' },
        ];

        let selectedBaseId = '0';
        let selectedPieceId = '0';
        let trackStyle = trackStyleSelect.value;
        let lapCount = parseInt(lapCountInput.value);
        let styleNum = Number(trackStyle);

        let trackData;
        trackData = Array(gridSize).fill().map(() => ({
            pieceId: '11',
            style: trackStyle
        }));


        function remapPieceId(pieceId) {
            let id = String(pieceId);

            const battleRanges = [
                [9, 12],
                [26, 30],
                [47, 51],
            ];

            const isBattleStyle = battleRanges.some(
                ([min, max]) => styleNum >= min && styleNum <= max
            );

            if (isBattleStyle) {
                if (id === '8') return '9';
                if (id === '9') return '8';

                if (id === '10') return '11';
                if (id === '11') return '10';
            }

            return id;
        }


        function getPieceImageUrl(trackStyle, pieceId) {
            pieceId = remapPieceId(pieceId);
            console.log(pieceId);
            return `./pieces/piececircuit${trackStyle}_${pieceId}.png`;
        }


        function buildPalette() {
            basePieces.forEach(({ id }, index) => {
                const btn = document.createElement('button');
                btn.dataset.baseId = id;
                btn.title = `${id}`;
                if (index === 0) btn.classList.add('selected');

                const img = document.createElement('img');
                img.src = getPieceImageUrl(trackStyle, id);
                btn.appendChild(img);

                btn.addEventListener('click', () => {
                    paletteDiv.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');

                    selectedBaseId = id;
                    selectedPieceId = currentRotationMap[id] || id;
                    updatePaletteImage();
                });


                paletteDiv.appendChild(btn);
            });
        }

        function updatePaletteImage() {
            const selectedBtn = paletteDiv.querySelector('button.selected');
            if (!selectedBtn) return;
            const img = selectedBtn.querySelector('img');
            img.src = getPieceImageUrl(trackStyle, selectedPieceId);
        }

        function buildGrid() {
            grid.innerHTML = '';
            for (let i = 0; i < gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;

                const img = document.createElement('img');
                img.width = 100;
                img.height = 100;
                img.src = getPieceImageUrl(trackStyle, '11');
                cell.appendChild(img);

                cell.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    isMouseDown = true;
                    updateCell(i, img);
                });

                cell.addEventListener('mouseenter', () => {
                    if (isMouseDown) {
                        updateCell(i, img);
                    }
                });

                cell.addEventListener('click', () => {
                    updateCell(i, img);
                });

                grid.appendChild(cell);
            }

            document.addEventListener('mouseup', () => {
                isMouseDown = false;
            });
        }

        function updateCell(index, imgElement) {
            trackData[index] = {
                pieceId: selectedPieceId,
                style: mixModeCheckbox.checked ? trackStyleSelect.value : trackStyle
            };
            imgElement.src = getPieceImageUrl(trackData[index].style, selectedPieceId);
        }


        function updateGridImages() {
            grid.childNodes.forEach((cell, i) => {
                const img = cell.querySelector('img');
                const { pieceId, style } = trackData[i];
                img.src = getPieceImageUrl(style, pieceId);
            });
        }

        function loadFromUrl() {
            const params = new URLSearchParams(window.location.search);
            let loaded = false;

            const mapParam = params.get('map');
            if (mapParam) {
                trackStyle = mapParam;
                trackStyleSelect.value = mapParam;
            }

            const lapParam = params.get('nl');
            if (lapParam && !isNaN(parseInt(lapParam)) && parseInt(lapParam) > 0) {
                lapCount = parseInt(lapParam);
                lapCountInput.value = lapCount;
            }

            for (let i = 0; i < gridSize; i++) {
                const p = params.get('p' + i);
                if (p !== null) {
                    trackData[i] = p;
                    loaded = true;
                }
            }

            if (loaded) {
                updateGridImages();
            }
        }

        function generateUrl() {
            const trackStyleSelect = document.getElementById('trackStyle');
            const selectedMode = trackStyleSelect.options[trackStyleSelect.selectedIndex].className;
            const baseUrl = `https://mkpc.malahieude.net/${selectedMode}.php`;
            const params = new URLSearchParams();
            params.set('map', trackStyle);
            const laps = lapCountInput.value;
            if (laps && !isNaN(parseInt(laps)) && parseInt(laps) > 0) {
                params.set('nl', laps);
            } else {
                params.set('nl', '3');
            }
            trackData.forEach((piece, i) => {
                const remappedId = remapPieceId(piece.pieceId);
                params.set('p' + i, remappedId);
            });
            const fullUrl = `${baseUrl}?${params.toString()}`;
            urlOutput.innerHTML = `<a href="${fullUrl}" target="_blank">${fullUrl}</a>`;
        }

        function rotateSelectedPiece() {
            selectedPieceId = rotationMap[selectedPieceId] || selectedPieceId;
            currentRotationMap[selectedBaseId] = selectedPieceId;
            updatePaletteImage();
        }
        function rotateSelectedPieceLeft() {
            selectedPieceId = reverseRotationMap[selectedPieceId] || selectedPieceId;
            currentRotationMap[selectedBaseId] = selectedPieceId;
            updatePaletteImage();
        }
        function flipSelectedPiece() {
            selectedPieceId = flipMap[selectedPieceId] || selectedPieceId;
            currentRotationMap[selectedBaseId] = selectedPieceId;
            updatePaletteImage();
        }

        let lastTrackStyle = trackStyleSelect.value;

        setInterval(() => {
            const currentStyle = trackStyleSelect.value;
            if (currentStyle !== lastTrackStyle) {
                lastTrackStyle = currentStyle;
                trackStyle = currentStyle;

                if (!mixModeCheckbox.checked) {
                    paletteDiv.querySelectorAll('button').forEach(btn => {
                        const baseId = btn.dataset.baseId;
                        btn.querySelector('img').src = getPieceImageUrl(trackStyle, baseId);
                    });

                    selectedPieceId = selectedBaseId;
                    updatePaletteImage();
                    updateGridImages();
                }
            }
        }, 300);

        lapCountInput.addEventListener('input', () => {
            lapCount = parseInt(lapCountInput.value);
            if (isNaN(lapCount) || lapCount < 1) {
                lapCountInput.value = '1';
                lapCount = 1;
            }
        });

        rotateButton.addEventListener('click', () => {
            rotateSelectedPiece();
        });
        rotateLeftButton.addEventListener('click', () => {
            rotateSelectedPieceLeft();
        });
        flipButton.addEventListener('click', () => {
            flipSelectedPiece();
        });

        document.getElementById("saveImageBtn").addEventListener("click", () => {
            const trackElement = document.getElementById("grid");

            html2canvas(trackElement).then(canvas => {
                const link = document.createElement("a");
                link.download = "track.png";
                link.href = canvas.toDataURL();
                link.click();
            });
        });

        const mixModeCheckbox = document.getElementById('mixModeCheckbox');
        const generateUrlBtn = document.getElementById('generateUrl');
        const gridSizeContainer = document.getElementById('gridSizeContainer');
        const gridSizeInput = document.getElementById('gridSizeInput');

        mixModeCheckbox.addEventListener('change', () => {
            generateUrlBtn.disabled = mixModeCheckbox.checked;
            gridSizeContainer.style.display = mixModeCheckbox.checked ? 'inline-block' : 'none';

            if (!mixModeCheckbox.checked) {
                gridSizeInput.value = 6;
                changeGridSize(6);
            }
        });
        document.getElementById('generateUrl').addEventListener('click', generateUrl);

        buildPalette();
        buildGrid();
        loadFromUrl();
        updatePaletteImage();
        let lastTrackStyleForPalette = trackStyle;

        setInterval(() => {
            const currentStyle = trackStyleSelect.value;
            if (currentStyle !== lastTrackStyleForPalette) {
                lastTrackStyleForPalette = currentStyle;
                trackStyle = currentStyle;

                paletteDiv.innerHTML = '';
                buildPalette();

                selectedPieceId = selectedBaseId;
                updatePaletteImage();
                updateGridImages();
            }
        }, 300);

        gridSizeInput.addEventListener('change', () => {
            if (mixModeCheckbox.checked) {
                changeGridSize(parseInt(gridSizeInput.value));
            }
        });

        function changeGridSize(size) {
            gridSize = size * size;

            grid.style.gridTemplateColumns = `repeat(${size}, 100px)`;
            grid.style.gridTemplateRows = `repeat(${size}, 100px)`;
            grid.style.width = `${size * 100}px`;

            trackData = Array(gridSize).fill().map(() => ({
                pieceId: '11',
                style: trackStyle
            }));

            buildGrid();
        }
    </script>

</body>

</html>
